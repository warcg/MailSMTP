<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Tester Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        dark: '#0f172a',
                        glass: 'rgba(255, 255, 255, 0.1)',
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex items-start md:items-center justify-center p-4 py-8 relative bg-[#0f172a]">
    <div class="fixed inset-0 z-0 bg-dark w-full h-full pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary rounded-full mix-blend-multiply filter blur-[128px] opacity-70 animate-blob"></div>
        <div class="absolute top-[20%] right-[-10%] w-96 h-96 bg-secondary rounded-full mix-blend-multiply filter blur-[128px] opacity-70 animate-blob animation-delay-2000"></div>
        <div class="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-pink-500 rounded-full mix-blend-multiply filter blur-[128px] opacity-70 animate-blob animation-delay-4000"></div>
    </div>

    <main class="relative z-10 w-full max-w-4xl glass-card rounded-2xl shadow-2xl backdrop-blur-xl border border-white/20">
        <div class="flex flex-col md:flex-row">
            <aside class="w-full md:w-1/3 bg-white/5 border-b md:border-b-0 md:border-r border-white/10 p-6 flex flex-col justify-center">
                <div class="mb-6 md:mb-10 text-center md:text-left">
                    <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400 flex items-center justify-center md:justify-start">
                        <i class="fa-solid fa-paper-plane mr-3 text-primary text-2xl"></i>MailTest
                    </h1>
                    <p class="text-gray-400 text-sm mt-3 leading-relaxed">Diagnóstico elegante de conexões</p>
                </div>
                <nav class="space-y-4">
                    <button id="tab-smtp" class="tab-btn w-full text-left px-5 py-4 rounded-xl flex items-center space-x-4 transition-all duration-300 bg-primary/20 text-white border border-primary/50 shadow-[0_0_15px_rgba(99,102,241,0.3)] hover:scale-[1.02]">
                        <div class="bg-primary/30 p-2 rounded-lg"><i class="fa-solid fa-server w-5 text-center text-primary-light"></i></div>
                        <span class="font-medium text-lg">Teste SMTP</span>
                    </button>
                    <button id="tab-imap" class="tab-btn w-full text-left px-5 py-4 rounded-xl flex items-center space-x-4 transition-all duration-300 text-gray-400 hover:text-white hover:bg-white/10 hover:border-white/20 border border-transparent">
                        <div class="bg-white/5 p-2 rounded-lg"><i class="fa-solid fa-inbox w-5 text-center"></i></div>
                        <span class="font-medium text-lg">Teste IMAP</span>
                    </button>
                </nav>
            </aside>

            <section class="w-full md:w-2/3 p-7 md:p-10 relative flex flex-col justify-center">
                <div class="absolute top-8 right-8 text-white/50 text-xs font-mono select-none">v1.0.0</div>
                <h2 id="form-title" class="text-2xl md:text-3xl font-semibold mb-6 md:mb-8 text-white flex items-center tracking-tight">Configuração SMTP</h2>

                <form id="test-form" class="space-y-6">
                    <input type="hidden" id="test-type" value="smtp">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-300 mb-2">Servidor (Host)</label>
                            <div class="relative group">
                                <i class="fa-solid fa-globe absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 group-focus-within:text-primary transition-colors"></i>
                                <input type="text" id="host" required placeholder="smtp.gmail.com" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-12 pr-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all hover:bg-white/10">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">Porta</label>
                            <div class="relative group">
                                <i class="fa-solid fa-hashtag absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 group-focus-within:text-primary transition-colors"></i>
                                <input type="number" id="port" required placeholder="587" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-12 pr-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all hover:bg-white/10">
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Segurança</label>
                        <div class="relative group">
                            <i class="fa-solid fa-shield-halved absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 group-focus-within:text-primary transition-colors z-10 pointer-events-none"></i>
                            <select id="security" class="w-full bg-[#1e293b]/90 text-white border border-white/10 rounded-xl py-3 pl-12 pr-10 focus:outline-none focus:ring-2 focus:ring-primary transition-all appearance-none cursor-pointer text-sm hover:bg-[#2a3a52]/90 shadow-sm relative z-0">
                                <option value="STARTTLS">STARTTLS (Recomendado SMTP)</option>
                                <option value="SSL">SSL / TLS (Recomendado IMAP)</option>
                                <option value="NONE">Nenhum (Inseguro - Porta 25 / 143)</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">Usuário / E-mail</label>
                            <div class="relative group">
                                <i class="fa-solid fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 group-focus-within:text-primary transition-colors"></i>
                                <input type="text" id="user" placeholder="seu@email.com" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-12 pr-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all hover:bg-white/10">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">Senha</label>
                            <div class="relative group">
                                <i class="fa-solid fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 group-focus-within:text-primary transition-colors"></i>
                                <input type="password" id="password" placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-12 pr-12 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all hover:bg-white/10">
                                <button type="button" id="toggle-password" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-white focus:outline-none transition-colors">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                            </div>
                            <p class="text-[11px] text-gray-400 mt-2 opacity-80">* Use senhas de aplicativo se possuir 2FA.</p>
                        </div>
                    </div>

                    <div class="pt-6 flex justify-end border-t border-white/10">
                        <button type="submit" id="submit-btn" class="w-full md:w-auto bg-gradient-to-r from-primary to-secondary hover:from-primary/90 hover:to-secondary/90 text-white font-medium py-3 px-8 rounded-xl shadow-lg shadow-primary/20 hover:shadow-primary/40 transform hover:-translate-y-0.5 transition-all duration-300 flex items-center justify-center space-x-3 border border-white/10">
                            <span>Testar Conexão</span>
                            <i id="btn-icon" class="fa-solid fa-bolt"></i>
                            <i id="btn-spinner" class="fa-solid fa-circle-notch fa-spin hidden"></i>
                        </button>
                    </div>
                </form>

                <div id="result-console" class="mt-6 rounded-xl overflow-hidden hidden transform transition-all duration-500 opacity-0 translate-y-4 shadow-lg">
                    <div id="result-header" class="px-5 py-3 font-medium text-sm flex items-center space-x-3">
                        <i id="result-icon" class="fa-solid text-lg"></i>
                        <span id="result-title" class="font-semibold tracking-wide"></span>
                    </div>
                    <div id="result-body" class="bg-[#0b1121]/80 p-5 text-sm font-mono text-gray-300 border-x border-b border-white/5 rounded-b-xl backdrop-blur-md break-words leading-relaxed max-h-48 overflow-y-auto custom-scrollbar"></div>
                </div>
            </section>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
